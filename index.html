<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMR Setup Engineer - Pro</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;600;700&family=Roboto:wght@300;400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ['Teko', 'sans-serif'],
                        body: ['Roboto', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        racing: {
                            red: '#ff2a2a',
                            dark: '#0f0f12',
                            carbon: '#1a1a1e',
                            silver: '#c0c0c0',
                            accent: '#3b82f6'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0f0f12; color: white; font-family: 'Roboto', sans-serif; margin: 0; }
        .racing-card { background: linear-gradient(145deg, #1a1a1e 0%, #121216 100%); border: 1px solid rgba(255,255,255,0.05); }
        .animate-pulse-red { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        /* Nascondi il root finché React non è pronto per evitare flash bianchi */
        #root:empty { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Caricamento Librerie in ordine corretto -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Script principale -->
    <script type="text/babel">
        // Definiamo i componenti fuori per chiarezza
        const { useState, useEffect } = React;

        const App = () => {
            const [apiKey, setApiKey] = useState(localStorage.getItem('pmr_key') || '');
            const [showSettings, setShowSettings] = useState(!apiKey);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [setup, setSetup] = useState(null);
            
            const [carModel, setCarModel] = useState('');
            const [track, setTrack] = useState('');
            const [device, setDevice] = useState('Volante (Direct Drive)');

            // Funzione per generare il setup
            const handleGenerate = async (e) => {
                e.preventDefault();
                if (!apiKey) { setShowSettings(true); return; }
                
                setLoading(true);
                setError(null);
                
                try {
                    // Carichiamo l'SDK dinamicamente per evitare errori di caricamento iniziale
                    const { GoogleGenAI } = await import('https://esm.run/@google/genai');
                    const genAI = new GoogleGenAI(apiKey);
                    const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

                    const prompt = `Sei un ingegnere di pista per Project Motor Racing. 
                    Genera un setup professionale per: Auto ${carModel}, Circuito ${track}, Periferica ${device}.
                    Rispondi solo in JSON: { "overview": "...", "tyres": {"pressione": "...", "camber": "..."}, "aero": {"ala_ant": "...", "ala_post": "..."}, "suspension": {"molle": "...", "altezza": "..."}, "drivetrain": {"diff": "..."} }`;

                    const result = await model.generateContent(prompt);
                    const text = result.response.text();
                    const jsonMatch = text.match(/\{[\s\S]*\}/);
                    
                    if (jsonMatch) {
                        setSetup(JSON.parse(jsonMatch[0]));
                    } else {
                        throw new Error("Formato risposta non valido.");
                    }
                } catch (err) {
                    console.error(err);
                    setError("Errore: Verifica la tua API Key o la connessione.");
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <nav className="border-b border-white/10 bg-black/50 backdrop-blur-lg p-4 sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-2">
                                <div className="bg-racing-red w-8 h-8 flex items-center justify-center font-display font-bold text-xl skew-x-[-10deg]">P</div>
                                <span className="font-display text-2xl tracking-tighter italic uppercase">PMR <span className="text-racing-red">Engineer</span></span>
                            </div>
                            <button onClick={() => setShowSettings(true)} className="text-xl opacity-50 hover:opacity-100 transition-opacity">⚙️</button>
                        </div>
                    </nav>

                    {/* Settings Modal */}
                    {showSettings && (
                        <div className="fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-4">
                            <div className="bg-racing-carbon p-8 rounded-2xl border border-white/10 max-w-md w-full shadow-2xl">
                                <h2 className="font-display text-3xl uppercase mb-2 italic">Configurazione</h2>
                                <p className="text-gray-500 text-sm mb-6 uppercase tracking-widest">Inserisci la tua Gemini API Key</p>
                                <input 
                                    type="password" 
                                    placeholder="Incolla chiave qui..." 
                                    className="w-full bg-black border border-white/10 p-4 rounded-xl mb-4 outline-none focus:border-racing-red"
                                    value={apiKey}
                                    onChange={(e) => {
                                        const val = e.target.value;
                                        setApiKey(val);
                                        localStorage.setItem('pmr_key', val);
                                    }}
                                />
                                <button 
                                    onClick={() => apiKey && setShowSettings(false)}
                                    className="w-full bg-racing-red p-4 rounded-xl font-display text-xl uppercase italic tracking-widest"
                                >
                                    Attiva Sistema
                                </button>
                                <a href="https://aistudio.google.com/app/apikey" target="_blank" className="block text-center mt-4 text-[10px] text-gray-600 hover:text-gray-400 uppercase tracking-widest">Ottieni chiave gratuita qui</a>
                            </div>
                        </div>
                    )}

                    <div className="max-w-7xl mx-auto px-6 py-12 grid grid-cols-1 lg:grid-cols-12 gap-12">
                        {/* Form */}
                        <div className="lg:col-span-4">
                            <form onSubmit={handleGenerate} className="racing-card p-8 rounded-2xl sticky top-24">
                                <div className="space-y-6">
                                    <h3 className="font-display text-2xl uppercase italic text-racing-red">Parametri Sessione</h3>
                                    <div>
                                        <label className="text-[10px] uppercase text-gray-500 tracking-widest block mb-2">Auto</label>
                                        <input required value={carModel} onChange={e => setCarModel(e.target.value)} className="w-full bg-black/50 border border-white/10 p-3 rounded-lg outline-none focus:border-racing-red" placeholder="es. Ferrari 296 GT3" />
                                    </div>
                                    <div>
                                        <label className="text-[10px] uppercase text-gray-500 tracking-widest block mb-2">Circuito</label>
                                        <input required value={track} onChange={e => setTrack(e.target.value)} className="w-full bg-black/50 border border-white/10 p-3 rounded-lg outline-none focus:border-racing-red" placeholder="es. Imola" />
                                    </div>
                                    <div>
                                        <label className="text-[10px] uppercase text-gray-500 tracking-widest block mb-2">Periferica</label>
                                        <select value={device} onChange={e => setDevice(e.target.value)} className="w-full bg-black/50 border border-white/10 p-3 rounded-lg outline-none focus:border-racing-red">
                                            <option>Volante (Direct Drive)</option>
                                            <option>Volante (Standard)</option>
                                            <option>Gamepad</option>
                                        </select>
                                    </div>
                                    <button disabled={loading} className="w-full bg-racing-red p-4 rounded-xl font-display text-2xl uppercase italic tracking-tighter hover:scale-[1.02] transition-transform disabled:opacity-50">
                                        {loading ? "Analisi in corso..." : "Genera Setup"}
                                    </button>
                                </div>
                            </form>
                        </div>

                        {/* Risultati */}
                        <div className="lg:col-span-8">
                            {error && <div className="bg-red-500/10 border border-red-500/50 p-4 rounded-xl text-red-500 text-sm mb-6">{error}</div>}
                            
                            {setup ? (
                                <div className="space-y-8 animate-in fade-in duration-700">
                                    <div className="border-l-4 border-racing-red pl-6">
                                        <h2 className="font-display text-6xl uppercase italic leading-none">{track}</h2>
                                        <p className="text-racing-red font-display text-2xl uppercase italic">{carModel}</p>
                                    </div>
                                    <div className="bg-white/5 p-6 rounded-xl italic text-gray-400 border border-white/5">
                                        "{setup.overview}"
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <Card title="Gomme" data={setup.tyres} />
                                        <Card title="Aero" data={setup.aero} />
                                        <Card title="Sospensioni" data={setup.suspension} />
                                        <Card title="Drivetrain" data={setup.drivetrain} />
                                    </div>
                                </div>
                            ) : (
                                <div className="h-[400px] border border-white/5 rounded-3xl flex flex-col items-center justify-center text-gray-800">
                                    <span className="text-6xl mb-4 opacity-20">🏁</span>
                                    <p className="font-display text-2xl uppercase tracking-[0.3em]">Ready to Race</p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const Card = ({ title, data }) => (
            <div className="racing-card p-6 rounded-xl">
                <h4 className="text-[10px] uppercase tracking-widest text-gray-500 mb-4 border-b border-white/5 pb-2">{title}</h4>
                <div className="space-y-2">
                    {Object.entries(data).map(([k, v]) => (
                        <div key={k} className="flex justify-between text-sm">
                            <span className="text-gray-500 uppercase text-[10px]">{k.replace('_', ' ')}</span>
                            <span className="font-mono text-racing-accent font-bold">{v}</span>
                        </div>
                    ))}
                </div>
            </div>
        );

        // Rendering finale
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
